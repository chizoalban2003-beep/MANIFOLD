[project]
name = "project-manifold"
version = "0.1.0"
description = "Multi-agent non-stationary framework for ontogenetic learning and dynamic valuation"
requires-python = ">=3.12"
dependencies = [
    "pandas>=2.1",
    "streamlit>=1.40",
]

[project.scripts]
manifold = "manifold.cli:main"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
