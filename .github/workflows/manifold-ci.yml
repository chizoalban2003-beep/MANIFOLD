name: MANIFOLD CI

on:
  push:
    branches: ["main", "master", "copilot/**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,db]"

      - name: Run tests
        run: |
          python -m pytest tests/ -q --tb=short

  lint:
    name: Pyflakes lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyflakes
        run: |
          pip install pyflakes

      - name: Run pyflakes
        run: |
          python -m pyflakes manifold/ 2>&1 | grep -v __pycache__ > out.txt || true
          if [ $(wc -l < out.txt) -gt 0 ]; then exit 1; fi

  ts-build:
    name: TypeScript type-check and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install TypeScript dependencies
        run: |
          cd manifold-ts
          npm install

      - name: Type-check
        run: |
          cd manifold-ts
          npx tsc --noEmit

      - name: Run tests
        run: |
          cd manifold-ts
          npm test

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test, lint, ts-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t manifold-ai:ci .
