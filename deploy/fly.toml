app = "manifold-ai"
primary_region = "lhr"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/metrics"
    protocol = "http"
    timeout = "5s"

[env]
  MANIFOLD_PORT = "8080"
  MANIFOLD_LOG_LEVEL = "INFO"

# Secrets — set with: fly secrets set MANIFOLD_API_KEY=... MANIFOLD_DB_URL=...
# MANIFOLD_API_KEY
# MANIFOLD_DB_URL

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
